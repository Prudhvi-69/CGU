<html>
    <head>
        <style>
            #display{
                width: 690px;
                height: 30px;
                margin-top: 10px;
                line-height: 20px;
                font-size: 20px;
                border: 2px solid black;
            }
        </style>
    </head>
    <body>
        <form>
            Value1 : <input type="number" id="val1" placeholder="Enter first value" required></input><br>
            Value2 : <input type="number" id="val2" placeholder="Enter second value" required></input><br>
            <input type="submit" value="Submit" onclick="checking()"></input><br>
            <!-- Result : <input type="textarea" id="display" placeholder="Result shows here"></input><br> -->

        </form>
        <button onclick="add()">Addition</button>
        <button onclick="sub()">Subtraction</button>
        <button onclick="mul()">Multiplication</button>
        <button onclick="div()">Division</button>
        <!-- <p id="display"></p> -->
        <div id="display">
                
         </div>
        <script>
            function add(){
                let a = parseFloat(document.getElementById('val1').value);
                let b = parseFloat(document.getElementById('val2').value);
                let c = a+b;
                document.getElementById('display').innerHTML='The sum of ' + a + ' + ' + b + ' = ' + c;
            }

            function sub(){
                let a = parseFloat(document.getElementById('val1').value);
                let b = parseFloat(document.getElementById('val2').value);
                let c = a-b;
                document.getElementById('display').innerHTML='The difference of ' + a + ' - ' + b + ' = ' + c;
            }
            function mul(){
                let a = parseFloat(document.getElementById('val1').value);
                let b = parseFloat(document.getElementById('val2').value);
                let c = a*b;
                document.getElementById('display').innerHTML='The product of ' + a + ' * ' + b + ' = ' + c;
            }
            function div(){
                let a = parseFloat(document.getElementById('val1').value);
                let b = parseFloat(document.getElementById('val2').value);
                let c = a/b;
                document.getElementById('display').innerHTML='The division of ' + a + ' / ' + b + ' = ' + c;
            }
            function checking()
            {   
                let a = parseFloat(document.getElementById('val1').value);
                let b = parseFloat(document.getElementById('val2').value);
                if(a<18)
                {
                    alert('You are not eligible to vote');
                }
                else
                {
                    alert('You are eligible to vote');
                }
            }
        </script>
    </body>    
</html>
