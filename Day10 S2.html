<html>
<body>
<form>
    <input type="textarea" id="val1" placeholder="Enter text"></input><br>
    <button id="submit">SUBMIT</button><br>
    <button id="reload">REFRESH</button><br>
</form>

<p id="shows"></p>
<script>
    document.getElementById('submit').addEventListener('click', (ev)=>{
        ev.preventDefault(); //Stops reload of page upon submit
        document.getElementById('shows').innerHTML='Button Clicked';
    });
    document.getElementById('reload').addEventListener('click', ()=>{
        location.reload(); //Refresh page manually with a button
        document.getElementById('shows').innerHTML='Page Refreshed';
    });

</script>
</body>
</html>
