<html>
<body>
<form> 
    <input type="textarea" id="val1" placeholder="Enter the Text"></input><br>
    <button id="btn">Click to show add and then not show sub result</button
</form>
<p id="result">Text shows here</p>
<script>
    document.getElementById('btn').addEventListener('click', function add(e){
        e.preventDefault();
        let t = document.getElementById('val1').value;
        document.getElementById('result').innerHTML="Input Entering is: "+t;
    });
</script>
</body>
</html>
